---
- name: Verify Vault structure
  hosts: vault_servers
  remote_user: root
  become: yes
  vars:
    vault_addr: "http://127.0.0.1:8200"
    vault_token: "hvs.xxxxxxxxxxxxxxxxxx"

    paths_to_check:
      - secret/DCMG/internal/server_management/admin_xcc
      - secret/DCMG/internal/host_management/root
      - secret/DCMG/internal/vm_management/administrator
      - secret/DCMG/internal/user_management/ndbadm
      - secret/DCDUS1/customers/Customer1/user_management/c1_user1
      - secret/private/user1
      - secret/development/tests

  tasks:

    - name: Check each Vault path
      shell: vault kv get -format=json {{ item }}
      register: vault_check
      ignore_errors: yes
      loop: "{{ paths_to_check }}"
      environment:
        VAULT_ADDR: "{{ vault_addr }}"
        VAULT_TOKEN: "{{ vault_token }}"
      loop_control:
        label: "{{ item }}"

    - name: Show verification results
      debug:
        msg: |
          Path: {{ item.item }}
          Status: {{ 'OK' if item.rc == 0 else 'MISSING' }}
      loop: "{{ vault_check.results }}"
