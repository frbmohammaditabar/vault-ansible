---
- name: Test Vault Connection
  hosts: localhost
  gather_facts: false
  vars:
    vault_addr: "http://192.168.122.109:8200"
    vault_token: "hvs.xxxxxxxxxxxxxxxxxxxxxxxxx"

  tasks:
    - name: Test Vault connectivity
      uri:
        url: "{{ vault_addr }}/v1/sys/health"
        method: GET
        status_code: [200, 501]  # 501 means uninitialized, which is OK
      register: vault_health

    - name: Display Vault health
      debug:
        var: vault_health
